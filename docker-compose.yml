version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=development
      - GEMINI_API_KEY=
      - FIREBASE_PROJECT_ID=
      - FIREBASE_PRIVATE_KEY=
      - FIREBASE_CLIENT_EMAIL=

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
